name = "RCCL"
supported_isas = [1201]
extra_args = []

[ubuntu]
test_package_name = "librccl1-tests"
test_debug_package_names = ["librccl1-tests-dbgsym", "librccl1-dbgsym", "libhsa-runtime64-1-dbgsym", "libamdhip64-7-dbgsym", "libamd-comgr3-dbgsym"]
test_binary_path = "/usr/libexec/rocm/librccl1-tests/"

[fedora]
test_package_name = "rccl-tests"
test_debug_package_names = ["rccl-tests-debuginfo", "rccl-debuginfo", "rocm-runtime-debuginfo", "rocm-comgr-debuginfo", "rocm-hip-debuginfo"]
test_binary_path = "/usr/bin/"
